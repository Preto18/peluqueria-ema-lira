<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @page { size: A4 landscape; margin: 1.5cm; }
    body { font-family: 'Helvetica', 'Arial', sans-serif; color: #222; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 12px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { background: #222; color: #fff; padding: 8px 6px; text-align: left; }
    td { padding: 6px; border-bottom: 1px solid #ddd; }
    tr:nth-child(even) td { background: #f9f9f9; }
    .footer { position: fixed; bottom: 0; font-size: 10px; color: #999; text-align: center; width: 100%; }
</style>
</head>
<body>
    <h1>Peluquería Ema Lira — {{ titulo }}</h1>
    <div class="subtitle">Generado el {{ ahora }}</div>
    <table>
        <thead>
            <tr>
                {% for col in columnas %}
                <th>{{ col }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for fila in filas %}
            <tr>
                {% for celda in fila %}
                <td>{{ celda }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="footer">Peluquería Ema Lira — Merced 814</div>
</body>
</html>
