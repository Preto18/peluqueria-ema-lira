<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesi&oacute;n &mdash; Ema Lira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background: #000;
        }
        .login-bg {
            position: fixed;
            inset: 0;
            background: url('{{ url_for('static', filename='img/ema-hero.png') }}') center 30% / cover no-repeat;
            filter: brightness(0.3) blur(6px) saturate(0.8);
            transform: scale(1.1);
            z-index: 0;
        }
        .login-noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.05;
            mix-blend-mode: overlay;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }
        .login-deco {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            pointer-events: none;
            z-index: 1;
        }
        .login-deco-1 {
            width: 400px; height: 400px;
            top: -120px; right: -100px;
        }
        .login-deco-2 {
            width: 250px; height: 250px;
            bottom: -60px; left: -60px;
        }
        .login-deco-3 {
            width: 180px; height: 180px;
            bottom: 30%; left: 5%;
        }
        .login-wrap {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
            animation: loginFadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes loginFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 0.75rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .login-card .brand {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.75rem;
            color: #000;
            letter-spacing: -0.5px;
            margin-bottom: 0.15rem;
        }
        .login-card .brand-sub {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 1.75rem;
            letter-spacing: 0.3px;
        }
        .input-group-login {
            position: relative;
            margin-bottom: 1rem;
        }
        .input-group-login .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 1rem;
            z-index: 10;
            pointer-events: none;
            transition: color 0.2s;
        }
        .input-group-login .form-control {
            border-radius: 12px;
            border: 1.5px solid #dee2e6;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s, padding-left 0.2s;
        }
        .input-group-login .form-control:focus {
            border-color: #000;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
            padding-left: 2.8rem;
        }
        .input-group-login .form-control:focus ~ .input-icon {
            color: #000;
        }
        .input-group-login .form-control::placeholder {
            color: #ced4da;
            font-size: 0.85rem;
        }
        .login-card .btn-login {
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 600;
            font-size: 0.9rem;
            background: #000;
            color: #fff;
            border: none;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .login-card .btn-login:hover {
            opacity: 0.9;
            transform: scale(1.01);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .login-card .btn-login:active {
            transform: scale(0.98);
        }
        .login-card .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: #adb5bd;
            text-decoration: none;
            transition: color 0.2s, gap 0.2s;
        }
        .login-card .back-link:hover {
            color: #000;
            gap: 0.55rem;
        }
        .login-card .alert {
            border-radius: 12px;
            font-size: 0.78rem;
            padding: 0.6rem 1rem;
            margin-bottom: 1.25rem;
        }
        .login-card .alert .btn-close {
            font-size: 0.7rem;
        }
        @media (max-width: 480px) {
            .login-deco { display: none; }
            .login-card { padding: 1.5rem 1rem; }
            .login-wrap { padding: 1rem; }
            .login-card .brand { font-size: 1.4rem; }
            .input-group-login .form-control { padding: 0.6rem 1rem 0.6rem 2.5rem; font-size: 0.85rem; }
        }
        @media (max-height: 600px) {
            .login-deco { display: none; }
            .login-card { padding: 1.25rem 1rem; }
            .login-logo { width: 44px; height: 44px; }
            .login-card .brand { font-size: 1.35rem; }
            .login-card .brand-sub { margin-bottom: 1rem; }
            .input-group-login { margin-bottom: 0.6rem; }
        }
        .login-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #e0e0e0, transparent);
            margin: 1.25rem 0;
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>
    <div class="login-noise"></div>
    <div class="login-overlay"></div>
    <div class="login-deco login-deco-1"></div>
    <div class="login-deco login-deco-2"></div>
    <div class="login-deco login-deco-3"></div>

    <div class="login-wrap">
        <div class="login-card">
            <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Ema Lira" class="login-logo" width="60" height="60">
            <div class="brand">Ema Lira</div>
            <div class="brand-sub">Panel administrativo</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show py-2 small">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="input-group-login">
                    <input type="text" name="username" class="form-control" placeholder="Ingres&aacute; tu usuario" required>
                    <i class="bi bi-person input-icon"></i>
                </div>
                <div class="input-group-login">
                    <input type="password" name="password" class="form-control" placeholder="Contrase&ntilde;a" required>
                    <i class="bi bi-lock input-icon"></i>
                </div>
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Ingresar
                </button>
            </form>

            <div class="login-divider"></div>

            <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
        </div>
    </div>
</body>
</html>
