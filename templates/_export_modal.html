{% for key, entidad in entidades.items() %}
<div class="modal fade" id="exportModal{{ key|capitalize }}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi {{ entidad.icono }} me-2"></i> Exportar {{ entidad.nombre }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="/admin/exportar/{{ key }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Formato</label>
                        <select name="formato" class="form-select">
                            <option value="csv">CSV</option>
                            <option value="xlsx">Excel (.xlsx)</option>
                            <option value="pdf">PDF</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-dark"><i class="bi bi-download me-1"></i> Exportar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endfor %}
