{% extends 'base.html' %}
{% block title %}Editar Pago{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><i class="bi bi-cash-coin me-2 text-success"></i> Editar Pago</div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="next" value="{{ request.referrer or '' }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cliente</label>
                    <select name="cliente_id" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        {% for c in clientes %}
                        <option value="{{ c.id }}" {{ 'selected' if pago.cliente_id == c.id else '' }}>{{ c.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Monto *</label>
                    <input type="number" step="0.01" name="monto" class="form-control" value="{{ pago.monto }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Metodo de pago</label>
                    <select name="metodo_pago" class="form-select">
                        <option value="efectivo" {{ 'selected' if pago.metodo_pago == 'efectivo' else '' }}>Efectivo</option>
                        <option value="tarjeta" {{ 'selected' if pago.metodo_pago == 'tarjeta' else '' }}>Tarjeta</option>
                        <option value="transferencia" {{ 'selected' if pago.metodo_pago == 'transferencia' else '' }}>Transferencia</option>
                        <option value="mercadopago" {{ 'selected' if pago.metodo_pago == 'mercadopago' else '' }}>Mercado Pago</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Concepto</label>
                <input type="text" name="concepto" class="form-control" value="{{ pago.concepto or '' }}">
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/admin/pagos" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
