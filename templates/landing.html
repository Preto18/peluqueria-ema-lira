<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ema Lira — Barbería Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fraunces:opsz,wght,SOFT@9..144,700;9..144,800;9..144,900,0;9..144,900,50&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .brand-logo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .brand-text { font-family: 'Fraunces', Georgia, serif; font-weight: 700; font-size: 1.2rem; color: #fff; }
        .navbar-public { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 0.75rem 0; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <nav class="navbar navbar-public" id="mainNav">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Ema Lira" class="brand-logo" width="36" height="36">
                <span class="brand-text">Ema Lira</span>
            </a>
            <div class="d-flex align-items-center gap-2">
                <a href="/agendar" class="btn btn-nav-cta">
                    <i class="bi bi-calendar-check me-1"></i> Agendá tu turno
                </a>
            </div>
        </div>
    </nav>

    <section class="hero" id="hero">
        <div class="hero-bg"></div>
        <div class="hero-noise"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-stagger" style="--order: 0">
                <div class="hero-icon">&#9986;</div>
            </div>
            <h1 class="hero-title hero-stagger" style="--order: 1">Ema Lira</h1>
            <p class="hero-subtitle hero-stagger" style="--order: 2">Barbería Profesional</p>
            <div class="hero-stagger" style="--order: 3">
                <a href="/agendar" class="btn btn-hero">
                    Agendá tu turno
                    <i class="bi bi-arrow-right ms-2"></i>
                </a>
            </div>
        </div>
    </section>

    <footer class="footer-minimal">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 Ema Lira — {{ info.direccion }}</p>
        </div>
    </footer>

    <a href="https://wa.me/{{ info.telefono }}" class="whatsapp-float" target="_blank" title="Contactanos por WhatsApp">
        <i class="bi bi-whatsapp"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
