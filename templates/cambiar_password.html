{% extends 'base.html' %}
{% block title %}Cambiar Contrase&ntilde;a{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><i class="bi bi-key me-2"></i> Cambiar Contrase&ntilde;a</div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Contrase&ntilde;a actual</label>
                <input type="password" name="actual" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nueva contrase&ntilde;a</label>
                <input type="password" name="nueva" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirmar nueva contrase&ntilde;a</label>
                <input type="password" name="confirmar" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/admin" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
