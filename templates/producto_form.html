{% extends 'base.html' %}
{% block title %}{{ 'Editar' if producto else 'Nuevo' }} Producto{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><i class="bi bi-box me-2 text-danger"></i> {{ 'Editar' if producto else 'Nuevo' }} Producto</div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="next" value="{{ request.referrer or '' }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="nombre" class="form-control" value="{{ producto.nombre if producto else '' }}" required>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Precio *</label>
                    <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio if producto else '' }}" required>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control" value="{{ producto.stock if producto else 0 }}">
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Categoria</label>
                    <select name="categoria" class="form-select">
                        <option value="">Sin categoria</option>
                        <option value="Shampoo" {{ 'selected' if producto and producto.categoria == 'Shampoo' else '' }}>Shampoo</option>
                        <option value="Acondicionador" {{ 'selected' if producto and producto.categoria == 'Acondicionador' else '' }}>Acondicionador</option>
                        <option value="Cera/Gel" {{ 'selected' if producto and producto.categoria == 'Cera/Gel' else '' }}>Cera / Gel</option>
                        <option value="Tinte" {{ 'selected' if producto and producto.categoria == 'Tinte' else '' }}>Tinte</option>
                        <option value="Accesorios" {{ 'selected' if producto and producto.categoria == 'Accesorios' else '' }}>Accesorios</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripcion</label>
                <textarea name="descripcion" class="form-control" rows="2">{{ producto.descripcion if producto else '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/admin/inventario" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
