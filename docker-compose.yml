services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: peluqueria
      POSTGRES_PASSWORD: peluqueria
      POSTGRES_DB: peluqueria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U peluqueria']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://peluqueria:peluqueria@db:5432/peluqueria
      SECRET_KEY: cambio-esta-key-en-produccion
      FLASK_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
